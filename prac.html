<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow | Home</title>
    <style>
        :root {
            --success : #2ecc71;
            --failed : #e74c3c;
            --reversed : #3498db;
        }

        body {
            background-color: purple;
            font-family :'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin : 0;
            display : flex;
            flex-direction : column;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        nav {
            background-color: rgba(8, 7, 7, 0.8);
            width: 100%;
            padding: 10px 0;
        }

        nav h1 {
            text-align: center; color: white; margin: 0; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        nav ul {
            list-style-type: none; margin: 0; padding: 0;
            display: flex; justify-content: center;
        }
            
        nav a { padding: 10px 20px; color: white; text-decoration: none; font-size: 14px; }

        /* Dashboard Look */
        .content-container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            width: 900px; 
            margin: auto; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: rgba(255,255,255,0.9);
            color: purple;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }

        footer { background-color: rgba(0, 0, 0, 0.7); color: white; text-align: center; padding: 10px; font-size: 12px; margin-top: auto;}
    </style>
</head>
<body>
    <nav>
        <h1>PayFlow</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="payments.html">Payments</a></li>
            <li><a href="transactions.html">Transactions</a></li>
        </ul>
    </nav>

    <div class="content-container">
        <h1>Welcome to PayFlow Protocol</h1>
        <p>Africa's most reliable gateway for scheduled M-Pesa transactions.</p>
        
        <div class="features-grid">
            <div class="feature-card">📅 Smart Scheduling</div>
            <div class="feature-card">📊 Live Tracking</div>
            <div class="feature-card">🔄 Instant Reversals</div>
        </div>

        <a href="payments.html" class="cta-button">Open Payment Portal &rarr;</a>
    </div>

    <footer>&copy; 2026 PayFlow. Built for Capstone Project.</footer>
</body>
</html>
