<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PayFlow</title>
    <link rel="icon" href="/credit-card-regular.png" type="image/x-icon">
    <style>
        :root {
            --success : #2ecc71;
            --failed : #e74c3c;
            --reversed : #3498db;
        }

        body {
            background-color: rgba(128, 0, 128, 0.777);
            font-family :'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin : 0;
            display : flex;
            flex-direction : column;
            height: 100vh;
            overflow: hidden; 
            color: white;
        }

        nav {
            background-color: rgba(8, 7, 7, 0.8);
            width: 100%;
            padding: 10px 0;
        }

        nav h1 {
            text-align: center; color: white; margin: 0; font-size: 1.5rem;
        }

        nav ul {
            list-style-type: none; margin: 0; padding: 0;
            display: flex; justify-content: center;
        }
            
        nav a { padding: 10px 20px; color: white; text-decoration: none; font-size: 14px; }

        .payment-form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            width: 450px; 
            margin: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #333;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        h3 { margin-top: 0; text-align: center; color: purple; font-size: 1.8rem; }

        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 1rem;
        }

        button {
            background-color: var(--success);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            width: 100%;
        }

        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <nav>
        <h1>PayFlow sign_up</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="payments.html">Payments</a></li>
            <li><a href="transactions.html">Transactions</a></li>
        </ul>
    </nav>

    <form class="payment-form" id="signup-form">
        <h3>Create Account</h3>
        
        <div class="form-group">
            <label for="new-username">Full Name (Account ID)</label>
            <input type="text" id="new-username" placeholder="e.g. Mwangi J." required>
        </div>

        <div class="form-group">
            <label for="initial-deposit">Initial Deposit (KSH)</label>
            <input type="number" id="initial-deposit" placeholder="Min 100" min="100" required>
        </div>

        <div class="form-group">
            <label for="new-pin">Set M-Pesa Transaction Pin</label>
            <input type="password" id="new-pin" maxlength="4" placeholder="4-digit pin" required>
        </div>

        <button type="submit">Initialize Account</button>
        <p style="text-align: center; font-size: 0.8rem; color: #666; margin-top: 15px;">
            By signing up, you agree to the PayFlow USSD Protocol.
        </p>
    </form>

    <footer>&copy; 2026 PayFlow. Built for Capstone Project.</footer>

    <script>
        function showToast(message, color) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position:fixed; top:20px; right:20px; padding: 15px 25px;
                border-radius: 10px; color: white; font-weight: bold; z-index: 1000;
                background-color: ${color}; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('new-username').value.trim();
            const deposit = Number(document.getElementById('initial-deposit').value);

            let accounts = JSON.parse(localStorage.getItem('accounts')) || {
                "Njeri": 5000,
                "Daniel": 4000
            };

            if (accounts[username]) {
                showToast("User already exists!", "#e74c3c");
                return;
            }

            accounts[username] = deposit;
            localStorage.setItem('accounts', JSON.stringify(accounts));

            showToast("Account created successfully!", "#2ecc71");

            setTimeout(() => {
                window.location.href = "payments.html";
            }, 1500);
        });
    </script>
</body>
</html>
