<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payments-Payflow</title>
    <link rel="icon" href="/credit-card-regular.png" type="image/x-icon">
   <style>
        :root {
            --success : #2ecc71;
            --failed : #e74c3c;
            --reversed : #3498db;
        }

        body {
            background-color: purple;
            background-size : cover;
            font-family :'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin : 0;
            display : flex;
            flex-direction : column;
            height: 100vh;
            overflow: hidden; 
        }
        svg {
            background-color: violet;
            max-width: 30px;
            max-height: 30px;
            padding-top: 30px;
        }
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap : 20px;
            padding :20px;
            max-width : 1200px;
            margin : auto;
        }   

        nav {
            background-color: rgba(8, 7, 7, 0.8);
            width: 100%;
            padding: 10px 0;
        }

        nav h1 {
            text-align: center; 
            color: white; 
            margin: 0; 
            font-size: 1.5rem;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
            
        nav a {
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .payment-form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            width: 800px; 
            margin: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2; 
        }

        h3 {
            margin-top: 0;
            text-align: center;
            grid-column: span 2;
        }

        input[type="text"], input[type="date"], input[type="number"] {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-top: 5px;
        }

        select {
            max-height: 50px;
            padding:10px 10px;
            border-radius: 8px;
            margin-top: 9px;
            border: none;
        }

        button {
            background-color: var(--reversed);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
     <nav>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M128 128C92.7 128 64 156.7 64 192L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 192C576 156.7 547.3 128 512 128L128 128zM320 208C381.9 208 432 258.1 432 320C432 381.9 381.9 432 320 432C258.1 432 208 381.9 208 320C208 258.1 258.1 208 320 208zM128 248L128 200C128 195.6 131.6 192 136 192L184 192C188.4 192 192.1 195.6 191.5 200C187.9 229 164.9 251.9 136 255.5C131.6 256 128 252.4 128 248zM128 392C128 387.6 131.6 383.9 136 384.5C165 388.1 187.9 411.1 191.5 440C192 444.4 188.4 448 184 448L136 448C131.6 448 128 444.4 128 440L128 392zM504 255.5C475 251.9 452.1 228.9 448.5 200C448 195.6 451.6 192 456 192L504 192C508.4 192 512 195.6 512 200L512 248C512 252.4 508.4 256.1 504 255.5zM512 392L512 440C512 444.4 508.4 448 504 448L456 448C451.6 448 447.9 444.4 448.5 440C452.1 411 475.1 388.1 504 384.5C508.4 384 512 387.6 512 392zM304 252C293 252 284 261 284 272C284 281.7 290.9 289.7 300 291.6L300 340L296 340C285 340 276 349 276 360C276 371 285 380 296 380L344 380C355 380 364 371 364 360C364 349 355 340 344 340L340 340L340 272C340 261 331 252 320 252L304 252z"/></svg>           
            PayFlow
        </h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="payments.html">Payments</a></li>
            <li><a href="transactions.html">Transactions</a></li>
        </ul>
    </nav>
 
    <form class="payment-form">
        <h3>Payment Details</h3>
        
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="mpesa-pin">M-Pesa Pin</label>
                <input type="text" id="mpesa-pin" required>
            </div>

            <div class="form-group">
                <label for="sender-name">Sender Name</label>
                <select name="" id="sender-name" required>
                    <option value="">Select Sender</option>
                    <option value="Njeri">Njeri</option>
                    <option value="Daniel">Daniel</option>
                </select>
            </div>

            <div class="form-group">
                <label for="recipient-name">Recipient Name</label>
                <select name="" id="recipient-name" required>
                    <option value="">Select Recipient</option>
                    <option value="Njeri">Njeri</option>
                    <option value="Daniel">Daniel</option>
                </select>            
            </div>

            <div class="form-group">
                <label for="amount">Amount (KSH)</label>
                <input type="number" id="amount" required>
            </div>

            <div class="form-group">
                <label for="date">Schedule Date</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group full-width">
                <button type="submit">Submit Payment</button>
            </div>
        </div>
    </form>

    <footer>
        &copy; 2026 PayFlow. Built for Capstone Project.
    </footer>
    </main>
    <script>
        function showToast(message, type) {
            const toast = document.createElement('div')
            toast.textContent = message;
             document.body.appendChild(toast);
            const bgColor = type === 'success' ? 'var(--success)' : 'var(--failed)';
            toast.style.cssText = `
            position:fixed; top:20px; right:20px; padding: 15px 25px;
            border-radius: 5px; color: white; font-weight: bold; z-index: 1000
            background-color: ${bgColor}; animation: fadeInOut 3s forwards;
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        const paymentForm = document.querySelector('.payment-form');
        paymentForm.addEventListener('submit', function(e){
             e.preventDefault();
            const transaction = {
                id: Date.now(),
                name: document.getElementById('name').value,
                sender: document.getElementById('sender-name').value,
                recipient: document.getElementById('recipient-name').value,
                amount: document.getElementById('amount').value,
                date: document.getElementById('date').value,
                status: 'scheduled',
                 
            };
        const scheduledDate = new Date(transaction.date);    
        const rightNow = new Date();
        const delay = scheduledDate - rightNow;
        
        let history = JSON.parse(localStorage.getItem('paymentHistory')) || [];
            history.push(transaction);
            localStorage.setItem('paymentHistory', JSON.stringify(history));

            showToast(`payment scheduled for ${transaction.date}`, 'success');
        
        if (delay <= 0) {
            processNow(transaction.id);
        } else {
            setTimeout(() => processNow(transaction.id), delay);
        }
        });

        function processNow(id) {
            let history = JSON.parse(localStorage.getItem('paymentHistory'));
            let accounts = JSON.parse(localStorage.getItem('accounts'));

            const index = history.findIndex(t => t.id === id);
            
            if (index !== -1) {
                const trans = history[index];
                const isSuccess = Math.random() > 0.5
                trans.status = isSuccess? 'success' : 'failure';
                
                if (isSuccess && accounts) {
                    const amount = parseFloat(trans.amount);
                    accounts[trans.sender] -= amount;
                    accounts[trans.recipient] += amount;
                    localStorage.setItem('accounts', JSON.stringify(accounts));

                }
                localStorage.setItem('paymentHistory', JSON.stringify(history));
            
                showToast(`Transaction ${trans.status}!`, trans.status === 'success'? 'success' : 'failed');
            }
        }
    </script>
</body>
</html>
