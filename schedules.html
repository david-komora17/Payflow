<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>money order-payFlow</title>
    <style>
        .payment-form {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 5px;
            width: 500px;
            margin: 20px auto;
        }
        input[type="text"], input[type="date"] {
            width: 95%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 15px;
        }
        :root {
            --success : #2ecc71;
            --failed : #e74c3c;
            --reversed : #3498db;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
        }
        body {
            background : url('/utility-bill-payment-portal-/pexels-scottwebb-305833.jpg') no-repeat center center fixed;
            background-size : cover;
            font-family :'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin : 0;
            display : flex;
            flex-direction : column;
            min-height : 100vh;
        }
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap : 20px;
            padding :20px;
            max-width : 1200px;
            margin : auto;
        }
        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: auto;
            height: 100px;
        }
        nav {
            background-color: rgba(8, 7, 7, 0.68);
            font-family: Arial, Helvetica, sans-serif;
            padding-top: 100px;
            width: 100%;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 10px 0;
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 20px;
        }
            
        li, a {
            display: flex;
            padding: 20px;
            color: white;
            text-decoration: none;
            justify-content: center;
            gap: 25px;
            width: 100%;
        }

    </style>
</head>
<body>
    
    <nav>

        </header>
        <ul>

            <li><a href="payments.html">Payments</a></li>
            <li><a href="transactions.html">Transactions</a></li>
            <li><a href="schedules.html">Schedules</a></li>
        </ul>
    </nav>
    <form class="payment-form">
        
        <label for="recipient">Recipient:</label><br>
        <input type="text" id="recipient" name="recipient" required><br><br>

        <label for="bill-type">Bill Type:</label><br>
        <input type="text" id="bill-type" name="bill-type" required><br><br>

        <label for="amount">Amount:</label><br>
        <input type="text" id="amount" name="amount" required><br><br>

        <label for="due-date">Due Date:</label><br>
        <input type="date" id="due-date" name="due-date" required><br><br>

        <input type="submit" value="Schedule Payment">
    </form>
