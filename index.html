<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow | Home</title>
    <link rel="icon" href="/credit-card-regular.png" type="image/x-icon">
    <style>
        :root {
            --success : #2ecc71;
            --failed : #e74c3c;
            --reversed : #3498db;
        }

        body {
            background-color: purple;
            font-family :'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin : 0;
            display : flex;
            flex-direction : column;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        svg {
            background-color: violet;
            max-width: 30px;
            max-height: 30px;
            padding-top: 30px;
        }

        nav {
            background-color: rgba(8, 7, 7, 0.8);
            width: 100%;
            padding: 10px 0;
        }

        nav h1 {
            text-align: center; 
            color: white; 
            margin: 0; 
            font-size: 1.5rem;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
        }

        nav span {
            padding-top: 30px;
            padding-left: 0;
        }

        nav ul {
            list-style-type: none; margin: 0; padding: 0;
            display: flex; justify-content: center;
        }
            
        nav a { padding: 10px 20px; color: white; text-decoration: none; font-size: 14px; }

        .content-container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            width: 900px; 
            margin: auto; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: rgba(255,255,255,0.9);
            color: purple;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }

        footer { background-color: rgba(0, 0, 0, 0.7); color: white; text-align: center; padding: 10px; font-size: 12px; margin-top: auto;}
    </style>
</head>
<body>
    <nav>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M128 128C92.7 128 64 156.7 64 192L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 192C576 156.7 547.3 128 512 128L128 128zM320 208C381.9 208 432 258.1 432 320C432 381.9 381.9 432 320 432C258.1 432 208 381.9 208 320C208 258.1 258.1 208 320 208zM128 248L128 200C128 195.6 131.6 192 136 192L184 192C188.4 192 192.1 195.6 191.5 200C187.9 229 164.9 251.9 136 255.5C131.6 256 128 252.4 128 248zM128 392C128 387.6 131.6 383.9 136 384.5C165 388.1 187.9 411.1 191.5 440C192 444.4 188.4 448 184 448L136 448C131.6 448 128 444.4 128 440L128 392zM504 255.5C475 251.9 452.1 228.9 448.5 200C448 195.6 451.6 192 456 192L504 192C508.4 192 512 195.6 512 200L512 248C512 252.4 508.4 256.1 504 255.5zM512 392L512 440C512 444.4 508.4 448 504 448L456 448C451.6 448 447.9 444.4 448.5 440C452.1 411 475.1 388.1 504 384.5C508.4 384 512 387.6 512 392zM304 252C293 252 284 261 284 272C284 281.7 290.9 289.7 300 291.6L300 340L296 340C285 340 276 349 276 360C276 371 285 380 296 380L344 380C355 380 364 371 364 360C364 349 355 340 344 340L340 340L340 272C340 261 331 252 320 252L304 252z"/></svg>           
            <span>PayFlow</span>
        </h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="payments.html">Payments</a></li>
            <li><a href="transactions.html">Transactions</a></li>
        </ul>
    </nav>

    <div class="content-container">
        <h1>Welcome to PayFlow Protocol</h1>
        <p>Africa's most reliable gateway for scheduled M-Pesa transactions.</p>
        
        <div class="features-grid">
            <div class="feature-card"> Smart Scheduling</div>
            <div class="feature-card"> Live Tracking</div>
            <div class="feature-card">
                 Instant Reversals</div>
        </div>

        <a href="payments.html" class="cta-button">Open Payment Portal &rarr;</a>
    </div>

    <footer>&copy; 2026 PayFlow. Built for Capstone Project.</footer>


    <script>
        if (!localStorage.getItem('accounts')) {
            localStorage.setItem('accounts', JSON.stringify({
                "Njeri": 5000,
                "Daniel": 4000
            }))
        }
        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('transactions', 'accounts')) || [];
            document.getElementById('tx-count').innerText = history.length;
        };

    </script>
</body>
</html>
